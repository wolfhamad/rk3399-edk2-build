name: Build edk2-rk3399

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:20.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install base dependencies
      run: |
        apt-get update
        apt-get install -y build-essential uuid-dev iasl python3-distutils git nasm gcc-aarch64-linux-gnu wget ca-certificates curl

    - name: Download and install GCC 5
      run: |
        mkdir -p /tmp/gcc5
        cd /tmp/gcc5
        
        wget http://archive.ubuntu.com/ubuntu/pool/universe/g/gcc-5/gcc-5-base_5.5.0-12ubuntu1_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/universe/g/gcc-5/gcc-5_5.5.0-12ubuntu1_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/universe/g/gcc-5/g++-5_5.5.0-12ubuntu1_amd64.deb
        wget http://archive.ubuntu.com/ubuntu/pool/main/m/mpc/libmpc3_1.0.3-1_amd64.deb || true
        
        dpkg -i *.deb || apt-get install -y -f

    - name: Verify GCC 5
      run: |
        gcc-5 --version
        g++-5 --version

    - name: Clone repositories
      run: |
        mkdir workspace-edk2
        cd workspace-edk2
        git config --global protocol.file.allow always
        git clone https://github.com/tianocore/edk2.git -b edk2-stable202002 --recursive --depth=1
        git clone https://github.com/tianocore/edk2-platforms.git -o cfdc7f907d545b14302295b819ea078bc36c6a40 --recursive --depth=1
        git clone https://github.com/strongtz/edk2-rk3399

    - name: Build edk2-rk3399
      working-directory: workspace-edk2/edk2-rk3399
      env:
        CC: gcc-5
        CXX: g++-5
      run: |
        bash build.sh --device polaris
        mv workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/SDM845PKG_UEFI.fd workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/RK3399_ZMOOTH_UEFI.fd

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: zmooth-edk2
        path: workspace-edk2/edk2-rk3399/workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/RK3399_ZMOOTH_UEFI.fd
        if-no-files-found: ignore
