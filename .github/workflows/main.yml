name: Build edk2-rk3399

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    
    container:
      image: ubuntu:20.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install base dependencies
      run: |
        apt-get update
        apt install -y build-essential uuid-dev iasl git nasm python3-distutils gcc-aarch64-linux-gnu


    - name: Clone repositories
      run: |
        mkdir workspace-edk2
        cd workspace-edk2
        git clone https://github.com/tianocore/edk2.git -o 3a3713e62cfad00d78bb938b0d9fb1eedaeff314 --recursive --depth=1
        git clone https://github.com/tianocore/edk2-platforms.git -o cfdc7f907d545b14302295b819ea078bc36c6a40 --recursive --depth=1
        git clone https://github.com/edk2-porting/edk2-rk3399.git


        
    - name: Build edk2-rk3399
      working-directory: workspace-edk2/edk2-rk3399
      run: |
        bash build.sh --device polaris
        mv workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/SDM845PKG_UEFI.fd workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/RK3399_ZMOOTH_UEFI.fd

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: zmooth-edk2
        path: workspace-edk2/edk2-rk3399/workspace/Build/sdm845Pkg/DEBUG_GCC5/FV/RK3399_ZMOOTH_UEFI.fd
        if-no-files-found: ignore
